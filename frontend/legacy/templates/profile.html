<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versafic — Business Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #fff;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0f0820 0%, #0a0a14 40%, #080d1a 100%);
        }

        .bg-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(120px);
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 20%, transparent 100%);
        }

        /* TOPBAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            z-index: 100;
        }

        .topbar-logo {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .topbar-logo-icon {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 900;
        }

        .verified-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #4ade80;
        }

        /* PROFILE WRAP */
        .profile-wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* AVATAR */
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin-bottom: 16px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-status {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid rgba(10, 10, 20, 0.9);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-align: center;
            margin-bottom: 5px;
        }

        .profile-handle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        .profile-badges {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .profile-bio {
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            line-height: 1.65;
            max-width: 380px;
            margin-bottom: 22px;
        }

        .profile-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.45);
        }

        .meta-value {
            color: #fff;
            font-weight: 600;
        }

        /* ===== PRIMARY CTA — CALL AI ===== */
        .call-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.35);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }

        .call-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.06), transparent);
        }

        .call-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(124, 58, 237, 0.45);
        }

        .call-btn-sub {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            margin-bottom: 24px;
        }

        /* ===== SECTION LABELS ===== */
        .link-section-title {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.22);
            width: 100%;
            margin-bottom: 8px;
            margin-top: 4px;
            padding-left: 2px;
        }

        /* ===== LINKTREE BUTTONS ===== */
        .link-btn {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.09);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.15s;
            margin-bottom: 8px;
            text-decoration: none;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .link-btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .link-btn-content {
            flex: 1;
            text-align: left;
        }

        .link-btn-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        .link-btn-sub {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.38);
            margin-top: 1px;
        }

        .link-arrow {
            color: rgba(255, 255, 255, 0.22);
            font-size: 0.85rem;
        }

        /* ===== SOCIAL MEDIA PLATFORM BUTTONS ===== */
        .social-platforms {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .social-platform-btn {
            width: 100%;
            padding: 13px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.15s;
            text-decoration: none;
        }

        .social-platform-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .sp-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .sp-handle {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .sp-followers {
            margin-left: auto;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 600;
        }

        /* Instagram */
        .sp-instagram {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        /* TikTok */
        .sp-tiktok {
            background: #000;
            border: 1px solid #333;
        }

        /* YouTube */
        .sp-youtube {
            background: #ff0000;
        }

        /* Twitter/X */
        .sp-twitter {
            background: #000;
            border: 1px solid #333;
        }

        /* WhatsApp */
        .sp-whatsapp {
            background: #25d366;
        }

        /* Website */
        .sp-website {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.3) !important;
        }

        /* ===== INFO CARD ===== */
        .info-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 8px;
        }

        .info-card-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.28);
            margin-bottom: 14px;
        }

        .hours-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.84rem;
            margin-bottom: 8px;
        }

        .hours-day {
            color: rgba(255, 255, 255, 0.45);
        }

        .hours-time {
            color: #fff;
            font-weight: 500;
        }

        /* ===== TRUST SCORE ===== */
        .trust-banner {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.13);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 8px;
        }

        .trust-score-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: #4ade80;
            letter-spacing: -0.04em;
        }

        .trust-label {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .trust-subtitle {
            font-size: 0.72rem;
            color: rgba(34, 197, 94, 0.65);
            font-weight: 600;
        }

        /* ===== FOOTER ===== */
        .profile-footer {
            margin-top: 36px;
            text-align: center;
        }

        .profile-footer a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.22);
            text-decoration: none;
            transition: color 0.15s;
        }

        .profile-footer a:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        .powered-icon {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
        }

        /* ===== CALL MODAL ===== */
        .call-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .call-modal.open {
            opacity: 1;
            pointer-events: all;
        }

        .call-sheet {
            width: 100%;
            max-width: 520px;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            transform: translateY(40px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -8px 60px rgba(0, 0, 0, 0.5);
        }

        .call-modal.open .call-sheet {
            transform: translateY(0);
        }

        .call-avatar-big {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            position: relative;
        }

        .ripple-ring {
            position: absolute;
            inset: -8px;
            border: 2px solid rgba(124, 58, 237, 0.4);
            border-radius: 28px;
            animation: ripple-box 2s ease-out infinite;
        }

        @keyframes ripple-box {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(1.4);
            }
        }

        .ripple-ring-2 {
            animation-delay: 1s;
        }

        .call-sheet h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .call-sheet p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .call-status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 0.82rem;
            color: #4ade80;
            font-weight: 600;
            margin-bottom: 22px;
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 8px #22c55e;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .call-actions {
            display: flex;
            gap: 12px;
        }

        .call-confirm-btn {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        .call-confirm-btn:hover {
            transform: translateY(-1px);
        }

        .call-cancel-btn {
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .call-credits-note {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.22);
            margin-top: 14px;
        }
    </style>
</head>
